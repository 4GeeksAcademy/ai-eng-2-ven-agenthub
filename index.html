        darkMode: "class",

          extend: {
            fontFamily: {
              sans: ["Manrope", "ui-sans-serif", "system-ui", "sans-serif"]
            }
          }
        }
      };

      (function applySavedTheme() {
        const saved = localStorage.getItem("agenthub-theme");
        const useDark = saved ? saved === "dark" : true;
        document.documentElement.classList.toggle("dark", useDark);
      })();
    </script>

      function statusBadge(status) {
        const map = {
          Active: "bg-emerald-100 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300",
          Inactive: "bg-slate-200 text-slate-800 dark:bg-slate-700 dark:text-slate-200",
          Failing: "bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300",
          Pending: "bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300",
          Suspended: "bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300"
        };
        return `<span class="inline-flex rounded-full px-2.5 py-1 text-xs font-semibold ${map[status] || map.Inactive}">${status}</span>`;
      }

      function severityBadge(severity, resolved) {
        if (resolved) {
          return '<span class="inline-flex rounded-full bg-emerald-100 px-2.5 py-1 text-xs font-semibold text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-300">Resolved</span>';
        }

        const map = {
          Critical: "bg-rose-100 text-rose-800 dark:bg-rose-900/40 dark:text-rose-300",
          Warning: "bg-amber-100 text-amber-800 dark:bg-amber-900/40 dark:text-amber-300",
          Info: "bg-sky-100 text-sky-800 dark:bg-sky-900/40 dark:text-sky-300"
        };
        return `<span class="inline-flex rounded-full px-2.5 py-1 text-xs font-semibold ${map[severity] || map.Info}">${severity}</span>`;
      }

      function countActiveAgentsForSkill(skillName) {
        return state.data.agents.filter((agent) => agent.status === "Active" && agent.allSkills.includes(skillName)).length;
      }

      function renderNav() {
        els.sidebarNav.innerHTML = navItems
          .map((item) => {
            const active = state.activeSection === item.id;
            return `
              <button
                type="button"
                data-nav="${item.id}"
                class="group flex w-full items-center justify-between rounded-xl border px-3 py-2.5 text-left transition ${
                  active
                    ? "border-sky-500/70 bg-sky-500/20 text-white"
                    : "border-slate-700/70 text-slate-300 hover:border-slate-500 hover:bg-slate-800/70 hover:text-white"
                }"
              >
                <span class="font-semibold">${item.label}</span>
                <span class="h-2.5 w-2.5 rounded-full ${active ? "bg-sky-300" : "bg-slate-600 group-hover:bg-slate-400"}"></span>
              </button>
            `;
          })
          .join("");

        els.sidebarNavCompact.innerHTML = navItems
          .map((item) => {
            const active = state.activeSection === item.id;
            return `
              <button
                type="button"
                data-nav="${item.id}"
                class="flex h-14 w-full items-center justify-center rounded-lg border text-xs font-extrabold tracking-wide transition ${
                  active
                    ? "border-sky-200 bg-sky-100 text-sky-900"
                    : "border-slate-200 bg-white text-slate-500 hover:border-slate-300 hover:text-slate-700"
                }"
              >
                ${item.compact}
              </button>
            `;
          })
          .join("");

        const current = navItems.find((item) => item.id === state.activeSection);
        els.workspaceTitle.textContent = current ? current.label : "Dashboard";
      }

        const selectedPoint = weeklyActivity.find((point) => point.day === state.activeChartDay) || weeklyActivity[3];

        const metrics = [
          {
            label: "Active Agents",
            value: state.data.agents.filter((agent) => agent.status === "Active").length,
            accent: "from-sky-500/20 to-sky-400/5",
            icon: "AG"
          },
          {
            label: "Contracts Live",
            value: state.data.contracts.length,
            accent: "from-emerald-500/20 to-emerald-400/5",
            icon: "CT"
          },
          {
            label: "Open Errors",
            value: state.data.errors.filter((error) => !error.resolved).length,
            accent: "from-rose-500/20 to-rose-400/5",
            icon: "ER"
          },
          {
            label: "Catalog Skills",
            value: state.data.capabilities.length,
            accent: "from-amber-500/20 to-amber-400/5",
            icon: "SK"
          }
        ];

        els.sections.dashboard.innerHTML = `
          <div class="grid grid-cols-2 gap-4 lg:grid-cols-4">
            ${metrics
              .map(
                (metric) => `
                  <article class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
                    <div class="mb-3 inline-flex h-9 w-9 items-center justify-center rounded-lg bg-gradient-to-br ${metric.accent} text-xs font-bold text-slate-900 dark:text-slate-100">
                      ${metric.icon}
                    </div>
                    <p class="text-sm font-semibold text-slate-500 dark:text-slate-400">${metric.label}</p>
                    <p class="mt-1 text-2xl font-extrabold tracking-tight">${metric.value}</p>
                  </article>
                `
              )
              .join("")}
          </div>

          <div class="select-none rounded-2xl border-2 border-dashed border-slate-300 bg-white/70 p-6 text-slate-600 dark:border-slate-700 dark:bg-slate-900/60 dark:text-slate-300" aria-label="Weekly Activity Chart placeholder">
            <p class="text-center text-sm font-semibold tracking-wide text-slate-500 dark:text-slate-400">Weekly Activity Chart</p>
            <p class="mt-1 text-center text-xs text-slate-500 dark:text-slate-400">Incident and automation workload over the last 7 days. Click a day bar to inspect details.</p>
            <div class="mt-4 grid grid-cols-7 items-end gap-2">
              ${weeklyActivity
                .map(
                  (point) => `
                    <button
                      type="button"
                      data-action="select-chart-day"
                      data-chart-day="${point.day}"
                      aria-label="${point.day}: ${point.workflows} workflows"
                      class="${point.heightClass} cursor-pointer rounded transition focus:outline-none focus:ring-2 focus:ring-sky-400 focus:ring-offset-1 dark:focus:ring-sky-300 ${
                        point.day === selectedPoint.day
                          ? "bg-sky-500 ring-2 ring-sky-300 shadow-md dark:bg-sky-400 dark:ring-sky-200"
                          : "bg-sky-200/80 hover:bg-sky-300 dark:bg-sky-900/50 dark:hover:bg-sky-800"
                      }"
                    ></button>
                  `
                )
                .join("")}
            </div>
            <div class="mt-2 grid grid-cols-7 text-center text-[10px] font-medium uppercase tracking-wide text-slate-400 dark:text-slate-500">
              ${weeklyActivity
                .map(
                  (point) => `
                    <span class="${point.day === selectedPoint.day ? "font-bold text-sky-600 dark:text-sky-300" : ""}">${point.day}</span>
                  `
                )
                .join("")}
            </div>
            <div class="mt-4 rounded-xl border border-slate-200 bg-white/80 p-3 text-xs dark:border-slate-700 dark:bg-slate-900/70">
              <p class="font-semibold text-slate-700 dark:text-slate-200">${selectedPoint.day} operational detail</p>
              <div class="mt-2 grid grid-cols-2 gap-2 sm:grid-cols-4">
                <p class="rounded bg-slate-100 px-2 py-1 dark:bg-slate-800">Workflows: <span class="font-semibold">${selectedPoint.workflows}</span></p>
                <p class="rounded bg-slate-100 px-2 py-1 dark:bg-slate-800">Auto-resolved: <span class="font-semibold">${selectedPoint.autoResolved}</span></p>
                <p class="rounded bg-slate-100 px-2 py-1 dark:bg-slate-800">Escalations: <span class="font-semibold">${selectedPoint.escalations}</span></p>
                <p class="rounded bg-slate-100 px-2 py-1 dark:bg-slate-800">Unresolved: <span class="font-semibold">${selectedPoint.unresolved}</span></p>
              </div>
            </div>
          </div>
        `;
      }

                              <button type="button" data-dropdown-toggle="user-${user.id}" class="rounded-md border border-slate-300 px-2 py-1 text-lg leading-none text-slate-600 hover:border-slate-400 dark:border-slate-700 dark:text-slate-200">⋮</button>
                              <div data-dropdown-menu="user-${user.id}" class="absolute right-0 top-full z-20 mt-1 hidden w-44 rounded-lg border border-slate-200 bg-white p-1 shadow-lg dark:border-slate-700 dark:bg-slate-900">
                                <button type="button" data-action="view-user" data-user-id="${user.id}" class="w-full rounded-md px-3 py-2 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-800">View detail</button>
                                <button type="button" data-action="delete-user" data-user-id="${user.id}" class="w-full rounded-md px-3 py-2 text-left text-sm text-rose-600 hover:bg-rose-50 dark:text-rose-400 dark:hover:bg-rose-950/30">Delete</button>
                              </div>
                            </div>
                          </td>
                        </tr>
                      `
                    )
                    .join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function renderAgents() {
        els.sections.agents.innerHTML = `
          <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
            ${state.data.agents
              .map(
                (agent) => `
                  <article class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
                    <div class="mb-4 flex items-start justify-between gap-3">
                      <div>
                        <h3 class="text-lg font-bold">${agent.name}</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400">Owner: ${agent.owner}</p>
                      </div>
                      <div class="flex items-center gap-2">
                        ${statusBadge(agent.status)}
                        <div class="relative" data-dropdown-root="agent-${agent.id}">
                          <button type="button" data-dropdown-toggle="agent-${agent.id}" class="rounded-md border border-slate-300 px-2 py-1 text-sm text-slate-600 hover:border-slate-400 dark:border-slate-700 dark:text-slate-200">⋮</button>
                          <div data-dropdown-menu="agent-${agent.id}" class="absolute right-0 z-10 mt-2 hidden w-44 rounded-lg border border-slate-200 bg-white p-1 shadow-lg dark:border-slate-700 dark:bg-slate-900">
                            <button type="button" data-action="configure-agent" data-agent-id="${agent.id}" class="w-full rounded-md px-3 py-2 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-800">Configure</button>
                          </div>
                        </div>
                      </div>
                    </div>

                    <p class="mb-3 text-sm font-semibold text-slate-600 dark:text-slate-300">Assigned Skills: ${agent.summarySkills.join(", ")}</p>

                    <button type="button" data-action="toggle-skills" data-agent-id="${agent.id}" class="rounded-md border border-slate-300 px-3 py-1.5 text-sm font-semibold text-slate-700 transition hover:border-slate-400 dark:border-slate-700 dark:text-slate-200 dark:hover:border-slate-500">
                      Expand skills
                    </button>
                    <div id="skills-panel-${agent.id}" class="mt-3 max-h-0 overflow-hidden transition-all duration-300">
                      <ul class="space-y-2 rounded-xl bg-slate-50 p-3 text-sm dark:bg-slate-800/70">
                        ${agent.allSkills
                          .map(
                            (skill) => `
                              <li class="flex items-center gap-2">
                                <span class="inline-block h-2 w-2 rounded-full bg-sky-500"></span>
                                <span>${skill}</span>
                              </li>
                            `
                          )
                          .join("")}
                      </ul>
                    </div>
                  </article>
                `
              )
              .join("")}
          </div>
        `;
      }

      function renderSkills() {
        els.sections.skills.innerHTML = `
          <div class="mb-5 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <p class="text-sm leading-relaxed text-slate-600 dark:text-slate-300">
              Skills are platform-level capability modules that agents can consume to expand domain reasoning, policy execution, and output quality.
              Controlling this catalog directly shapes runtime behavior across all tenant deployments.
            </p>
          </div>

          <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
            ${state.data.capabilities
              .map(
                (skill) => `
                  <article class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
                    <div class="mb-3 flex items-start justify-between gap-3">
                      <div>
                        <h3 class="text-lg font-bold">${skill.name}</h3>
                        <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">${skill.description}</p>
                      </div>
                      <div class="relative" data-dropdown-root="skill-${skill.id}">
                        <button type="button" data-dropdown-toggle="skill-${skill.id}" class="rounded-md border border-slate-300 px-2 py-1 text-sm text-slate-600 hover:border-slate-400 dark:border-slate-700 dark:text-slate-200">⋮</button>
                        <div data-dropdown-menu="skill-${skill.id}" class="absolute right-0 z-10 mt-2 hidden w-52 rounded-lg border border-slate-200 bg-white p-1 shadow-lg dark:border-slate-700 dark:bg-slate-900">
                          <button type="button" data-action="view-parameters" data-skill-id="${skill.id}" class="w-full rounded-md px-3 py-2 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-800">View technical parameters</button>
                          <button type="button" data-action="remove-skill" data-skill-id="${skill.id}" class="w-full rounded-md px-3 py-2 text-left text-sm text-rose-600 hover:bg-rose-50 dark:text-rose-400 dark:hover:bg-rose-950/30">Remove capability</button>
                        </div>
                      </div>
                    </div>
                    <button type="button" class="rounded-full border border-sky-200 bg-sky-100 px-3 py-1 text-xs font-bold text-sky-900 dark:border-sky-800 dark:bg-sky-900/40 dark:text-sky-300">
                      Active agents: ${countActiveAgentsForSkill(skill.name)}
                    </button>
                  </article>
                `
              )
              .join("")}
          </div>
        `;
      }

      function renderContracts() {
        els.sections.contracts.innerHTML = `
          <div class="rounded-2xl border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <div>
              <table class="w-full table-fixed text-left text-sm">
                <thead class="bg-slate-100 text-xs uppercase tracking-[0.08em] text-slate-600 dark:bg-slate-800 dark:text-slate-300">
                  <tr>
                    <th class="px-4 py-3">Client Name</th>
                    <th class="px-4 py-3">Rented Agent</th>
                    <th class="px-4 py-3">List of Contracted Skills</th>
                    <th class="px-4 py-3">Activation Date</th>
                    <th class="px-4 py-3">Expiration Date</th>
                    <th class="px-4 py-3">Total Amount Paid</th>
                    <th class="px-4 py-3 text-right">Actions</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 dark:divide-slate-800">
                  ${state.data.contracts
                    .map(
                      (contract) => `
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/60">
                          <td class="px-4 py-3 font-semibold whitespace-normal break-words">${contract.clientName}</td>
                          <td class="px-4 py-3 whitespace-normal break-words">${contract.rentedAgent}</td>
                          <td class="px-4 py-3 whitespace-normal break-words text-slate-600 dark:text-slate-300">${contract.skills.join(", ")}</td>
                          <td class="px-4 py-3 whitespace-nowrap">${contract.activationDate}</td>
                          <td class="px-4 py-3 whitespace-nowrap">${contract.expirationDate}</td>
                          <td class="px-4 py-3 font-semibold">${contract.totalPaid}</td>
                          <td class="px-4 py-3 text-right align-middle">
                            <div class="relative inline-block text-left" data-dropdown-root="contract-${contract.id}">
                              <button type="button" data-dropdown-toggle="contract-${contract.id}" class="rounded-md border border-slate-300 px-2 py-1 text-lg leading-none text-slate-600 hover:border-slate-400 dark:border-slate-700 dark:text-slate-200">⋮</button>
                              <div data-dropdown-menu="contract-${contract.id}" class="absolute right-0 top-full z-20 mt-1 hidden w-40 rounded-lg border border-slate-200 bg-white p-1 shadow-lg dark:border-slate-700 dark:bg-slate-900">
                                <button type="button" data-action="view-contract" data-contract-id="${contract.id}" class="w-full rounded-md px-3 py-2 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-800">View detail</button>
                              </div>
                            </div>
                          </td>
                        </tr>
                      `
                    )
                    .join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function renderErrors() {
        els.sections.errors.innerHTML = `
          <div class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <div class="overflow-x-auto">
              <table class="min-w-full text-left text-sm">
                <thead class="bg-slate-100 text-xs uppercase tracking-[0.08em] text-slate-600 dark:bg-slate-800 dark:text-slate-300">
                  <tr>
                    <th class="px-4 py-3">Timestamp</th>
                    <th class="px-4 py-3">Agent Name</th>
                    <th class="px-4 py-3">Error Type</th>
                    <th class="px-4 py-3">Message</th>
                    <th class="px-4 py-3">Severity</th>
                    <th class="px-4 py-3 text-right">Actions</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-slate-200 dark:divide-slate-800">
                  ${state.data.errors
                    .map(
                      (entry) => `
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/60">
                          <td class="px-4 py-3">${entry.timestamp}</td>
                          <td class="px-4 py-3 font-semibold">${entry.agentName}</td>
                          <td class="px-4 py-3">${entry.errorType}</td>
                          <td class="px-4 py-3 text-slate-600 dark:text-slate-300">${entry.message}</td>
                          <td class="px-4 py-3">${severityBadge(entry.severity, entry.resolved)}</td>
                          <td class="px-4 py-3 text-right">
                            <div class="inline-flex items-center gap-2">
                              <div class="relative" data-dropdown-root="error-${entry.id}">
                                <button type="button" data-dropdown-toggle="error-${entry.id}" class="rounded-md border border-slate-300 px-2 py-1 text-lg leading-none text-slate-600 hover:border-slate-400 dark:border-slate-700 dark:text-slate-200">⋮</button>
                                <div data-dropdown-menu="error-${entry.id}" class="absolute right-0 z-10 mt-2 hidden w-44 rounded-lg border border-slate-200 bg-white p-1 shadow-lg dark:border-slate-700 dark:bg-slate-900">
                                  <button type="button" data-action="view-stack" data-error-id="${entry.id}" class="w-full rounded-md px-3 py-2 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-800">Open stack trace</button>
                                </div>
                              </div>
                              <button type="button" data-action="resolve-error" data-error-id="${entry.id}" class="rounded-md border px-3 py-1.5 text-xs font-semibold transition ${
                                entry.resolved
                                  ? "cursor-not-allowed border-emerald-200 bg-emerald-50 text-emerald-700 dark:border-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-300"
                                  : "border-amber-300 bg-amber-100 text-amber-900 hover:border-amber-400 dark:border-amber-700 dark:bg-amber-900/40 dark:text-amber-300"
                              }" ${entry.resolved ? "disabled" : ""}>Mark as resolved</button>
                            </div>
                          </td>
                        </tr>
                      `
                    )
                    .join("")}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function renderSections() {
        renderDashboard();
        renderUsers();
        renderAgents();
        renderSkills();
        renderContracts();
        renderErrors();

        Object.entries(els.sections).forEach(([key, sectionEl]) => {
          sectionEl.classList.toggle("hidden", key !== state.activeSection);
        });
      }

      function setDropdown(dropdownId) {
        state.openDropdown = dropdownId;
        document.querySelectorAll("[data-dropdown-menu]").forEach((menu) => {
          const key = menu.getAttribute("data-dropdown-menu");
          menu.classList.toggle("hidden", key !== dropdownId);
        });
      }

      function closeDropdowns() {
        setDropdown(null);
      }

      function commitAction(mutator) {
        mutator();
        renderSections();
      }

      function openModal(kicker, title, html) {
        state.modal = { kicker, title };
        els.modalKicker.textContent = kicker;
        els.modalTitle.textContent = title;
        els.modalBody.innerHTML = html;
        els.modalOverlay.classList.remove("hidden");
        els.modalOverlay.classList.add("flex");
      }

      function closeModal() {
        state.modal = null;
        els.modalOverlay.classList.add("hidden");
        els.modalOverlay.classList.remove("flex");
        els.modalBody.innerHTML = "";
      }

      function updateThemeLabel() {
        const dark = document.documentElement.classList.contains("dark");
        els.themeToggle.textContent = dark ? "Switch to Light" : "Switch to Dark";
      }

      function handleActionClick(target) {
        if (target.matches("[data-nav]")) {
          state.activeSection = target.getAttribute("data-nav");
          closeDropdowns();
          renderNav();
          renderSections();
          return;
        }

        if (target.matches("[data-dropdown-toggle]")) {
          const key = target.getAttribute("data-dropdown-toggle");
          setDropdown(state.openDropdown === key ? null : key);
          return;
        }

        if (target.matches("[data-action='select-chart-day']")) {
          const day = target.getAttribute("data-chart-day");
          if (!day) return;
          state.activeChartDay = day;
          renderDashboard();
          return;
        }

        if (target.matches("[data-action='view-user']")) {
          const user = state.data.users.find((item) => item.id === target.getAttribute("data-user-id"));
          if (!user) return;
          closeDropdowns();
          openModal(
            "User Profile",
            user.name,
            `
              <dl class="grid grid-cols-1 gap-3 text-sm sm:grid-cols-2">
                <div><dt class="font-semibold text-slate-500 dark:text-slate-400">Email</dt><dd>${user.email}</dd></div>
                <div><dt class="font-semibold text-slate-500 dark:text-slate-400">Plan</dt><dd>${user.plan}</dd></div>
                <div><dt class="font-semibold text-slate-500 dark:text-slate-400">Status</dt><dd>${user.status}</dd></div>
                <div><dt class="font-semibold text-slate-500 dark:text-slate-400">Role</dt><dd>${user.role}</dd></div>
                <div><dt class="font-semibold text-slate-500 dark:text-slate-400">Region</dt><dd>${user.region}</dd></div>
                <div><dt class="font-semibold text-slate-500 dark:text-slate-400">Last Login</dt><dd>${user.lastLogin}</dd></div>
              </dl>
            `
          );
          return;
        }

        if (target.matches("[data-action='delete-user']")) {
          const userId = target.getAttribute("data-user-id");
          const user = state.data.users.find((item) => item.id === userId);
          if (!user) return;

          closeDropdowns();
          commitAction(() => {
            state.data.users = state.data.users.filter((item) => item.id !== userId);
          });
          return;
        }

        if (target.matches("[data-action='toggle-skills']")) {
          const agentId = target.getAttribute("data-agent-id");
          const panel = document.getElementById(`skills-panel-${agentId}`);
          if (!panel) return;
          const isOpen = panel.style.maxHeight && panel.style.maxHeight !== "0px";
          panel.style.maxHeight = isOpen ? "0px" : `${panel.scrollHeight}px`;
          target.textContent = isOpen ? "Expand skills" : "Collapse skills";
          return;
        }

        if (target.matches("[data-action='configure-agent']")) {
          const agentId = target.getAttribute("data-agent-id");
          const agent = state.data.agents.find((item) => item.id === agentId);
          if (!agent) return;

          closeDropdowns();
          openModal(
            "Prompt Configuration",
            agent.name,
            `
              <label class="mb-2 block text-sm font-semibold text-slate-600 dark:text-slate-300">System Prompt Instructions</label>
              <textarea id="prompt-editor" class="h-56 w-full rounded-xl border border-slate-300 bg-white p-3 text-sm outline-none ring-sky-500 focus:ring dark:border-slate-700 dark:bg-slate-950" aria-label="Prompt editor">${agent.prompt}</textarea>
              <div class="mt-4 flex justify-end">
                <button type="button" data-action="save-agent-prompt" data-agent-id="${agent.id}" class="rounded-lg bg-sky-600 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-500">Save Prompt</button>
              </div>
            `
          );
          return;
        }

        if (target.matches("[data-action='save-agent-prompt']")) {
          const agentId = target.getAttribute("data-agent-id");
          const editor = document.getElementById("prompt-editor");
          const value = editor ? editor.value.trim() : "";
          if (!value) return;

          commitAction(() => {
            state.data.agents = state.data.agents.map((agent) =>
              agent.id === agentId
                ? {
                    ...agent,
                    prompt: value
                  }
                : agent
            );
          });

          closeModal();
          return;
        }

        if (target.matches("[data-action='view-parameters']")) {
          const skillId = target.getAttribute("data-skill-id");
          const skill = state.data.capabilities.find((item) => item.id === skillId);
          if (!skill) return;

          closeDropdowns();
          openModal(
            "Technical Parameters",
            skill.name,
            `<ul class="space-y-2 text-sm">${skill.parameters
              .map((parameter) => `<li class="rounded-lg bg-slate-100 px-3 py-2 dark:bg-slate-800">${parameter}</li>`)
              .join("")}</ul>`
          );
          return;
        }

        if (target.matches("[data-action='remove-skill']")) {
          const skillId = target.getAttribute("data-skill-id");
          const skill = state.data.capabilities.find((item) => item.id === skillId);
          if (!skill) return;

          closeDropdowns();
          commitAction(() => {
            state.data.capabilities = state.data.capabilities.filter((item) => item.id !== skillId);
          });
          return;
        }

        if (target.matches("[data-action='view-contract']")) {
          const contractId = target.getAttribute("data-contract-id");
          const contract = state.data.contracts.find((item) => item.id === contractId);
          if (!contract) return;

          closeDropdowns();
          openModal(
            "Itemized Invoice",
            `${contract.clientName} - ${contract.rentedAgent}`,
            `
              <ul class="space-y-2 text-sm">
                ${contract.invoice
                  .map(
                    (line) => `
                      <li class="flex items-center justify-between rounded-lg bg-slate-100 px-3 py-2 dark:bg-slate-800">
                        <span>${line.label}</span>
                        <span class="font-semibold">${line.amount}</span>
                      </li>
                    `
                  )
                  .join("")}
              </ul>
              <p class="mt-4 text-right text-sm font-bold">Total: ${contract.totalPaid}</p>
            `
          );
          return;
        }

        if (target.matches("[data-action='view-stack']")) {
          const errorId = target.getAttribute("data-error-id");
          const entry = state.data.errors.find((item) => item.id === errorId);
          if (!entry) return;

          closeDropdowns();
          openModal(
            "Stack Trace",
            `${entry.agentName} - ${entry.errorType}`,
            `<pre class="whitespace-pre-wrap rounded-xl bg-slate-950 p-4 text-xs text-slate-100">${entry.stackTrace}</pre>`
          );
          return;
        }

        if (target.matches("[data-action='resolve-error']")) {
          const errorId = target.getAttribute("data-error-id");
          const entry = state.data.errors.find((item) => item.id === errorId);
          if (!entry || entry.resolved) return;

          commitAction(() => {
            state.data.errors = state.data.errors.map((item) =>
              item.id === errorId
                ? {
                    ...item,
                    resolved: true
                  }
                : item
            );
          });
        }
      }

      function initEventHandlers() {
        document.addEventListener("click", (event) => {
          const target = event.target;

          if (!(target instanceof HTMLElement)) return;

          if (target.closest("#modal-overlay") && !target.closest("#modal-body") && !target.closest("#modal-title") && !target.closest("#modal-kicker") && !target.closest("#modal-close")) {
            if (target === els.modalOverlay) {
              closeModal();
            }
            return;
          }

          if (target.closest("[data-nav], [data-dropdown-toggle], [data-action]")) {
            handleActionClick(target.closest("[data-nav], [data-dropdown-toggle], [data-action]"));
            return;
          }

          if (!target.closest("[data-dropdown-root]")) {
            closeDropdowns();
          }
        });

        els.modalClose.addEventListener("click", closeModal);

        els.modalOverlay.addEventListener("click", (event) => {
          if (event.target === els.modalOverlay) {
            closeModal();
          }
        });

        els.themeToggle.addEventListener("click", () => {
          const currentlyDark = document.documentElement.classList.toggle("dark");
          localStorage.setItem("agenthub-theme", currentlyDark ? "dark" : "light");
          updateThemeLabel();
        });
      }

      function init() {
        renderNav();
        renderSections();
        updateThemeLabel();
        initEventHandlers();
      }

      init();
    </script>
  </body>
</html>
